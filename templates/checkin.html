{% extends 'base.html' %}

{% block title %}二维码签到 - 校园活动管理系统{% endblock %}

{% block extra_css %}
<style>
    .qr-scanner-container {
        max-width: 500px;
        margin: 0 auto;
        text-align: center;
    }
    
    #qr-reader {
        width: 100%;
        margin-bottom: 20px;
    }
    
    #qr-result {
        font-size: 1.2em;
        margin: 20px 0;
        padding: 15px;
        border-radius: 8px;
        display: none;
    }
    
    .success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
    
    .error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
</style>
{% endblock %}

{% block content %}
<div class="qr-scanner-container">
    <div class="text-center mb-4">
        <h1><i class="fas fa-qrcode me-2"></i>二维码签到</h1>
        <p class="text-muted">扫描活动二维码完成签到</p>
    </div>
    
    <!-- QR Code 扫描器 -->
    <div id="qr-reader"></div>
    
    <!-- 扫描结果 -->
    <div id="qr-result"></div>
    
    <!-- 手动签到 -->
    <div class="card mt-4">
        <div class="card-header">
            <h5 class="mb-0"><i class="fas fa-keyboard me-2"></i>手动输入签到</h5>
        </div>
        <div class="card-body">
            <form id="manualCheckinForm">
                <div class="mb-3">
                    <label for="activityId" class="form-label">活动ID</label>
                    <input type="number" class="form-control" id="activityId" placeholder="请输入活动ID">
                </div>
                <div class="mb-3">
                    <label for="token" class="form-label">签到令牌</label>
                    <input type="text" class="form-control" id="token" placeholder="请输入签到令牌">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check-circle me-2"></i>手动签到
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- HTML5 QR Code Scanner Library -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 检查是否已登录
    const token = localStorage.getItem('access_token');
    if (!token) {
        showMessage('warning', '请先登录才能使用签到功能');
        setTimeout(() => {
            window.location.href = '/login/?redirect=/checkin/';
        }, 2000);
        return;
    }
    
    // 初始化QR Code扫描器
    const html5QrCode = new Html5Qrcode("qr-reader");
    const qrCodeSuccessCallback = (decodedText, decodedResult) => {
        // 停止扫描
        html5QrCode.stop().then(() => {
            // 解析二维码内容
            processQRCode(decodedText);
        }).catch(err => {
            console.error("停止扫描器失败:", err);
        });
    };
    
    const config = { 
        fps: 10, 
        qrbox: { width: 250, height: 250 } 
    };
    
    // 开始扫描
    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        qrCodeSuccessCallback
    ).catch(err => {
        console.error("启动摄像头失败:", err);
        showMessage('warning', '无法访问摄像头，请检查权限设置');
    });
    
    // 手动签到表单
    document.getElementById('manualCheckinForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const activityId = document.getElementById('activityId').value;
        const tokenInput = document.getElementById('token').value;
        
        if (!activityId || !tokenInput) {
            showMessage('warning', '请输入活动ID和签到令牌');
            return;
        }
        
        manualCheckin(activityId, tokenInput);
    });
});

function processQRCode(qrText) {
    const resultDiv = document.getElementById('qr-result');
    
    try {
        // 尝试解析URL参数
        const url = new URL(qrText);
        const activityId = url.searchParams.get('activity_id');
        const token = url.searchParams.get('token');
        
        if (activityId && token) {
            // 调用签到API
            checkin(activityId, token);
        } else {
            resultDiv.className = 'error';
            resultDiv.innerHTML = '<i class="fas fa-times-circle me-2"></i>无效的二维码，缺少必要参数';
            resultDiv.style.display = 'block';
        }
    } catch (e) {
        // 如果不是URL，尝试直接解析JSON或其他格式
        console.error('解析二维码失败:', e);
        resultDiv.className = 'error';
        resultDiv.innerHTML = '<i class="fas fa-times-circle me-2"></i>无法识别的二维码格式';
        resultDiv.style.display = 'block';
    }
}

function checkin(activityId, token) {
    const accessToken = localStorage.getItem('access_token');
    const resultDiv = document.getElementById('qr-result');
    
    resultDiv.style.display = 'block';
    resultDiv.className = '';
    resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>验证中...';
    
    axios.post(`${API_BASE_URL}/attendance/checkin/`, {
        activity_id: activityId,
        token: token
    }, {
        headers: {
            'Authorization': `Bearer ${accessToken}`
        }
    })
    .then(response => {
        resultDiv.className = 'success';
        resultDiv.innerHTML = `
            <i class="fas fa-check-circle me-2"></i>签到成功！
            <div class="mt-2">
                <p class="mb-1">活动：${response.data.activity_title}</p>
                <p class="mb-1">签到时间：${new Date(response.data.checkin_time).toLocaleString()}</p>
            </div>
        `;
        
        // 3秒后重新开始扫描
        setTimeout(() => {
            resultDiv.style.display = 'none';
            restartScanner();
        }, 3000);
    })
    .catch(error => {
        console.error('签到失败:', error);
        
        let errorMessage = '签到失败';
        if (error.response && error.response.data) {
            if (error.response.data.error) {
                errorMessage = error.response.data.error;
            }
        }
        
        resultDiv.className = 'error';
        resultDiv.innerHTML = `<i class="fas fa-times-circle me-2"></i>${errorMessage}`;
        
        // 5秒后重新开始扫描
        setTimeout(() => {
            resultDiv.style.display = 'none';
            restartScanner();
        }, 5000);
    });
}

function manualCheckin(activityId, token) {
    const accessToken = localStorage.getItem('access_token');
    
    axios.post(`${API_BASE_URL}/attendance/checkin/`, {
        activity_id: activityId,
        token: token
    }, {
        headers: {
            'Authorization': `Bearer ${accessToken}`
        }
    })
    .then(response => {
        showMessage('success', `签到成功！活动：${response.data.activity_title}`);
        
        // 清空表单
        document.getElementById('activityId').value = '';
        document.getElementById('token').value = '';
    })
    .catch(error => {
        console.error('手动签到失败:', error);
        
        let errorMessage = '签到失败';
        if (error.response && error.response.data) {
            if (error.response.data.error) {
                errorMessage = error.response.data.error;
            }
        }
        
        showMessage('danger', errorMessage);
    });
}

function restartScanner() {
    const html5QrCode = new Html5Qrcode("qr-reader");
    const qrCodeSuccessCallback = (decodedText, decodedResult) => {
        html5QrCode.stop().then(() => {
            processQRCode(decodedText);
        }).catch(err => {
            console.error("停止扫描器失败:", err);
        });
    };
    
    const config = { 
        fps: 10, 
        qrbox: { width: 250, height: 250 } 
    };
    
    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        qrCodeSuccessCallback
    ).catch(err => {
        console.error("重新启动摄像头失败:", err);
    });
}
</script>
{% endblock %}
