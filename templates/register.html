{% extends 'base.html' %}

{% block title %}用户注册 - 校园活动管理系统{% endblock %}

{% block content %}
<div class="login-container">
    <div class="text-center mb-4">
        <h2><i class="fas fa-user-plus me-2"></i>用户注册</h2>
        <p class="text-muted">创建您的校园活动系统账号</p>
    </div>

    <form id="registerForm">
        <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
        <div class="row">
            <div class="col-md-6 mb-5">
                <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
                </div>
                <div class="form-text">推荐使用学号作为用户名</div>
            </div>

            <div class="col-md-6 mb-5">
                <label for="student_id" class="form-label">学号 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                    <input type="text" class="form-control" id="student_id" name="student_id" required placeholder="请输入学号">
                </div>
            </div>
        </div>

        <div class="mb-5">
            <label for="email" class="form-label">邮箱 <span class="text-danger">*</span></label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control" id="email" name="email" required placeholder="请输入邮箱">
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-5">
                <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="至少8位字符">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="col-md-6 mb-5">
                <label for="password2" class="form-label">确认密码 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password2" name="password2" required placeholder="再次输入密码">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword2">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-5">
                <label for="college" class="form-label">学院</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-university"></i></span>
                    <input type="text" class="form-control" id="college" name="college" placeholder="请输入学院">
                </div>
            </div>

            <div class="col-md-6 mb-5">
                <label for="major" class="form-label">专业</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-graduation-cap"></i></span>
                    <input type="text" class="form-control" id="major" name="major" placeholder="请输入专业">
                </div>
            </div>
        </div>

        <div class="mb-5">
            <label for="phone" class="form-label">手机号</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="请输入手机号">
            </div>
        </div>

        <div class="d-grid gap-2 mb-5">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-user-plus me-2"></i>立即注册
            </button>
        </div>

        <div class="text-center">
            <p class="mb-0">已有账号？<a href="/login/">立即登录</a></p>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 密码显示/隐藏切换
    function setupPasswordToggle(inputId, buttonId) {
        document.getElementById(buttonId).addEventListener('click', function() {
            const passwordInput = document.getElementById(inputId);
            const icon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    }

    setupPasswordToggle('password', 'togglePassword1');
    setupPasswordToggle('password2', 'togglePassword2');

    // 注册表单提交
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 收集表单数据
        const formData = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            password2: document.getElementById('password2').value,
            student_id: document.getElementById('student_id').value,
            phone: document.getElementById('phone').value || '',
            college: document.getElementById('college').value || '',
            major: document.getElementById('major').value || ''
        };

        // 验证密码
        if (formData.password !== formData.password2) {
            showMessage('danger', '两次输入的密码不一致');
            return;
        }

        if (formData.password.length < 8) {
            showMessage('danger', '密码长度至少为8位');
            return;
        }

        // 禁用按钮，显示加载状态
        const submitBtn = this.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>注册中...';
        submitBtn.disabled = true;

        // 获取CSRF token
        function getCSRFToken() {
            const cookieValue = document.cookie
                .split('; ') 
                .find(row => row.startsWith('csrftoken='))
                ?.split('=')[1];
            return cookieValue;
        }

        // 调用注册API
        axios.post(`${API_BASE_URL}/auth/register/`, formData, {
            headers: {
                'X-CSRFToken': getCSRFToken()
            }
        })
        .then(response => {
            showMessage('success', '注册成功！正在自动登录...');

            // 自动登录
        return axios.post(`${API_BASE_URL}/auth/login/`, {
            username: formData.username,
            password: formData.password
        }, {
            headers: {
                'X-CSRFToken': getCSRFToken()
            }
        });
        })
        .then(response => {
            // 保存token
            localStorage.setItem('access_token', response.data.access);
            localStorage.setItem('refresh_token', response.data.refresh);

            // 获取用户信息
            return axios.get(`${API_BASE_URL}/auth/profile/`, {
                headers: {
                    'Authorization': `Bearer ${response.data.access}`
                }
            });
        })
        .then(response => {
            localStorage.setItem('user_info', JSON.stringify(response.data));

            // 延迟跳转
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        })
        .catch(error => {
            console.error('注册失败:', error);

            let errorMessage = '注册失败，请检查表单信息';
            if (error.response && error.response.data) {
                // 提取具体的错误信息
                const errors = error.response.data;
                if (typeof errors === 'object') {
                    errorMessage = '';
                    for (const key in errors) {
                        errorMessage += `${key}: ${Array.isArray(errors[key]) ? errors[key].join(', ') : errors[key]}\n`;
                    }
                } else if (typeof errors === 'string') {
                    errorMessage = errors;
                }
            }

            showMessage('danger', errorMessage);

            // 恢复按钮状态
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        });
    });

    // 如果已登录，重定向到首页
    if (localStorage.getItem('access_token')) {
        window.location.href = '/';
    }
});
</script>
{% endblock %}
